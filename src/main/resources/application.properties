# ========================
# Server Configuration
# ========================
server.port=8080

# ========================
# H2 Database (File-based for persistence)
# ========================
# Data is stored under ./data/campus_parking.mv.db so it survives restarts.
# AUTO_SERVER=TRUE allows multiple JVMs / tools (e.g. DB viewer + app) to share the file
# instead of failing with "Database may be already in use".
spring.datasource.url=jdbc:h2:file:./data/campus_parking;AUTO_SERVER=TRUE
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# H2 web console (disabled by default for safety; enable only in dev if needed)
spring.h2.console.enabled=false
spring.h2.console.path=/h2-console

# ========================
# JPA / Hibernate
# ========================
# `update` preserves data across restarts and auto-applies new columns.
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.defer-datasource-initialization=true

# ========================
# JWT Configuration
# ========================
# Override these in production via environment variables:
#   export JWT_SECRET="<long random secret>"
#   export JWT_EXPIRATION=86400000
jwt.secret=${JWT_SECRET:campusParkingSecretKey2024CampusParkingManagementSystemJWTSecretKeyForHS256Algorithm}
jwt.expiration=${JWT_EXPIRATION:86400000}

# ========================
# Application
# ========================
spring.application.name=Campus Parking Management System
