<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description"
        content="Campus Parking Management System - Real-time parking slot availability, reservation, and management for students, staff, and administrators.">
    <title>Campus Parking Management System</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="/css/styles.css">
</head>

<body>

    <!-- Navigation -->
    <nav class="navbar" id="navbar">
        <div class="nav-brand">
            <div class="nav-logo">
                <img src="/images/logo.png?v=2" alt="IIT ISM Dhanbad - Indian Institute of Technology" />

        <div class="nav-links" id="navLinks"></div>
        <div class="nav-actions" id="navActions"></div>
    </nav>

    <main class="main-content" id="app">

    <div class="toast-container" id="toastContainer"></div>
